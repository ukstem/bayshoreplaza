<!DOCTYPE html>
<!-- Source for og-image.jpg (1200x630 social share card).
     Regenerate with: Chrome headless screenshot at 1200x630 (see README). -->
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@600;800&family=Instrument+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; box-sizing: border-box; }
  body { width: 1200px; height: 630px; overflow: hidden; }
  .card {
    width: 1200px; height: 630px;
    background: linear-gradient(135deg, #0c4a4e 0%, #123c3f 70%, #12807a 130%);
    color: #f6f1e7;
    font-family: "Instrument Sans", sans-serif;
    position: relative;
    padding: 70px 80px;
    display: flex; flex-direction: column; justify-content: center;
  }
  .stripe {
    position: absolute; top: 0; left: 0; right: 0; height: 16px;
    background: repeating-linear-gradient(90deg,
      #e9a13b 0 60px, #f6f1e7 60px 120px, #12807a 120px 180px, #f6f1e7 180px 240px);
  }
  .waves { width: 84px; height: 84px; margin-bottom: 36px; }
  h1 {
    font-family: "Bricolage Grotesque", sans-serif;
    font-size: 92px; font-weight: 800; letter-spacing: -0.02em;
    color: #ffffff; line-height: 1.05; margin-bottom: 18px;
  }
  .tag { font-size: 40px; color: #e9a13b; font-weight: 600; margin-bottom: 30px; }
  .line { font-size: 28px; color: #cfe3df; font-weight: 400; max-width: 900px; }
  .loc {
    position: absolute; bottom: 54px; left: 80px;
    font-size: 26px; font-weight: 600; letter-spacing: 0.12em;
    text-transform: uppercase; color: #f6f1e7; opacity: 0.85;
  }
</style>
</head>
<body>
  <div class="card">
    <div class="stripe"></div>
    <svg class="waves" viewBox="0 0 32 32"><rect width="32" height="32" rx="7" fill="#12807a"/><path d="M5 20c3-4 6-4 9 0s6 4 9 0" stroke="#e9a13b" stroke-width="2.5" fill="none" stroke-linecap="round"/><path d="M5 13c3-4 6-4 9 0s6 4 9 0" stroke="#f6f1e7" stroke-width="2.5" fill="none" stroke-linecap="round"/></svg>
    <h1>Bayshore Plaza</h1>
    <div class="tag">Port Antonio's shopping hub</div>
    <div class="line">Supermarket · Pharmacy · Food · Fashion · Banking · Shipping<br>Open daily, early morning until midnight</div>
    <div class="loc">Boundbrook · Port Antonio · Portland · Jamaica</div>
  </div>
</body>
</html>
